<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lord of Mysteries | Biblioteca</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #0B0E14;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .audio-header {
            flex-shrink: 0;
            width: 100%;
            height: 80px;
            background: #0B0E14;
            border-bottom: 1px solid #C5A059;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .audio-header p {
            color: #C5A059;
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            margin-bottom: 6px;
            letter-spacing: 2px;
        }

        audio {
            width: 80%;
            max-width: 500px;
            height: 30px;
            filter: sepia(80%) brightness(80%) invert(10%);
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            display: block;
            min-height: 0;
        }
    </style>
</head>
<body>

    <div class="audio-header">
        <p>AMBIENTACIÓN MUSICAL</p>
        <audio controls autoplay loop>
            <source src="Playlist.mp3" type="audio/mpeg">
        </audio>
    </div>

    <iframe name="main_frame" src="principal.html" id="contenido"></iframe>

</body>
</html>
