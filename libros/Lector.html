<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lord of Mysteries - Volumen">
    <title>Lord of Mysteries | Lector</title>
    <link rel="stylesheet" href="../CSS/libros.css">
</head>
<body>
    <!-- HEADER CON NAVEGACION -->
    <header class="header-libro">
        <nav class="nav-container">
            <a href="../lord-of-mysteries-volumenes.html" class="btn-volver" target="main_frame">
                <span>&larr;</span>
                <span>Volver a la Biblioteca</span>
            </a>
            <h1 class="libro-titulo-header">
                <span class="titulo-decoracion">✦</span>
                <span data-reader-title>Lord of Mysteries</span>
                <span class="titulo-decoracion">✦</span>
            </h1>
        </nav>
    </header>

    <!-- CONTAINER DEL LIBRO -->
    <main class="libro-container">
        <!-- VISOR LOCAL DEL LIBRO -->
        <div class="iframe-wrapper book-viewer" data-book-viewer data-pdf="">
            <span class="corner-decoration top-right">◈</span>
            <span class="corner-decoration bottom-left">◈</span>
            <span class="corner-decoration bottom-right">◈</span>
            <div class="book-toolbar" aria-label="Controles del libro">
                <button class="book-button" type="button" data-book-prev aria-label="Pagina anterior">&lsaquo;</button>
                <label class="book-page-jump">
                    <span>Pagina</span>
                    <input type="number" min="1" value="1" data-book-page>
                    <span data-book-total>/ ...</span>
                </label>
                <button class="book-button" type="button" data-book-next aria-label="Pagina siguiente">&rsaquo;</button>
                <div class="book-zoom" aria-label="Zoom">
                    <button class="book-button" type="button" data-book-zoom-out aria-label="Reducir zoom">-</button>
                    <button class="book-button" type="button" data-book-zoom-in aria-label="Aumentar zoom">+</button>
                </div>
            </div>
            <div class="book-stage" aria-live="polite">
                <div class="book-cover book-cover-left" aria-hidden="true"></div>
                <div class="book-cover book-cover-right" aria-hidden="true"></div>
                <div class="book-pages">
                    <figure class="book-page book-page-left">
                        <canvas data-page-left></canvas>
                        <button class="page-turn-zone page-turn-prev" type="button" data-corner-prev aria-label="Pagina anterior"></button>
                        <button class="page-turn-zone page-turn-next page-turn-next-single" type="button" data-corner-next-single aria-label="Pagina siguiente"></button>
                    </figure>
                    <div class="book-spine" aria-hidden="true"></div>
                    <figure class="book-page book-page-right">
                        <canvas data-page-right></canvas>
                        <button class="page-turn-zone page-turn-next" type="button" data-corner-next aria-label="Pagina siguiente"></button>
                    </figure>
                </div>
                <p class="book-status" data-book-status>Cargando libro...</p>
            </div>
            <input class="book-progress" type="range" min="1" value="1" data-book-progress aria-label="Progreso del libro">
        </div>

        <!-- INFORMACION ADICIONAL -->
        <aside class="libro-info">
            <h2 class="info-titulo" data-reader-info-title>Sobre este Volumen</h2>
            <p class="info-texto" data-reader-description></p>
        </aside>
    </main>
    <script type="module" src="../JS/book-loader.js"></script>
</body>
</html>
